<!DOCTYPE html>
<html>
<head>
<title>RSA Secure System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 🌌 Animated Background */
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
color:white;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* Header */
header{
text-align:center;
padding:20px;
font-size:28px;
color:#00fff7;
letter-spacing:1px;
}

/* Tabs */
.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.tabs button{
padding:12px 25px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
border-radius:8px;
transition:0.3s;
backdrop-filter:blur(5px);
}

.tabs button:hover{
background:#00adb5;
transform:scale(1.05);
}

/* Tab Content */
.tabcontent{
display:none;
padding:30px;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

/* Glass Card */
.box{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:15px;
width:70%;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
transition:0.3s;
}

.box:hover{
transform:translateY(-5px);
}

/* Inputs */
input,textarea{
width:70%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
transition:0.3s;
}

input:focus,textarea:focus{
background:rgba(0,255,247,0.2);
box-shadow:0 0 10px #00fff7;
}

/* Buttons */
button{
padding:12px 20px;
margin:10px;
background:#00adb5;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

button:hover{
background:#00fff7;
color:black;
box-shadow:0 0 15px #00fff7;
transform:scale(1.05);
}

/* Stats */
.stats{
margin-top:20px;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
}

/* Floating particles */
.particle{
position:fixed;
width:5px;
height:5px;
background:white;
opacity:0.3;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<header>🔐 RSA Secure Communication System</header>

<div class="tabs">
<button onclick="openTab('encrypt')">Encrypt & Send</button>
<button onclick="openTab('decrypt')">Decrypt</button>
<button onclick="openTab('analysis')">Analysis</button>
</div>

<!-- ENCRYPT -->
<div id="encrypt" class="tabcontent">
<div class="box">

<h2>Sender</h2>

<input id="message" placeholder="Enter message">
<input id="receiver" placeholder="Receiver Email">

<button onclick="generateKeys()">Generate Keys</button>
<p id="keys"></p>

<button onclick="encrypt()">Encrypt</button>
<textarea id="encrypted"></textarea>

<button onclick="sendEmail()">Send Email</button>

</div>
</div>

<!-- DECRYPT -->
<div id="decrypt" class="tabcontent">
<div class="box">

<h2>Receiver</h2>

<textarea id="cipher"></textarea>
<button onclick="decrypt()">Decrypt</button>
<textarea id="decrypted"></textarea>

</div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="tabcontent">
<div class="box">

<h2>Graph Analysis</h2>
<canvas id="graph"></canvas>
<button onclick="drawGraph()">Generate</button>

<div class="stats" id="stats"></div>

</div>
</div>

<script>

/* Tabs */
function openTab(tab){
document.querySelectorAll(".tabcontent").forEach(t=>t.style.display="none");
document.getElementById(tab).style.display="block";
}
openTab("encrypt");

/* RSA LOGIC (UNCHANGED) */
let e,d,n;
let encryptedData=[];

function gcd(a,b){while(b!=0){let t=b;b=a%b;a=t;}return a;}

function generatePrime(){
let primes=[11,13,17,19,23,29];
return primes[Math.floor(Math.random()*primes.length)];
}

function generateKeys(){
let p=generatePrime(), q=generatePrime();
n=p*q;
let phi=(p-1)*(q-1);

e=3;
while(gcd(e,phi)!=1) e+=2;

for(let i=1;i<phi;i++){
if((i*e)%phi==1){d=i;break;}
}

document.getElementById("keys").innerHTML=`Public: (${e},${n})<br>Private: (${d},${n})`;
}

function modPow(base,exp,mod){
let result=1;
base%=mod;
while(exp>0){
if(exp%2==1) result=(result*base)%mod;
exp=Math.floor(exp/2);
base=(base*base)%mod;
}
return result;
}

function encrypt(){
let msg=document.getElementById("message").value;
encryptedData=[];
for(let ch of msg){
encryptedData.push(modPow(ch.charCodeAt(0),e,n));
}
document.getElementById("encrypted").value=encryptedData;
document.getElementById("cipher").value=encryptedData;
}

function decrypt(){
let data=document.getElementById("cipher").value.split(",");
let result="";
for(let num of data){
result+=String.fromCharCode(modPow(parseInt(num),d,n));
}
document.getElementById("decrypted").value=result;
}

/* EMAIL */
function sendEmail(){

let receiver=document.getElementById("receiver").value;
let message=document.getElementById("encrypted").value;

fetch("http://127.0.0.1:5000/send",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({receiver,message})
})
.then(res=>res.json())
.then(data=>{
if(data.status==="success"){
alert("✅ Email Sent!");
}else{
alert("❌ "+data.msg);
}
})
.catch(()=>{
alert("❌ Server not reachable!");
});

}

/* GRAPH */
let chart;

function drawGraph(){

let ctx=document.getElementById("graph").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels: encryptedData.map((_,i)=>"Char "+(i+1)),
datasets:[{label:"Encrypted Values",data:encryptedData}]
}
});

let sum=encryptedData.reduce((a,b)=>a+b,0);
let mean=sum/encryptedData.length;
let variance=encryptedData.reduce((a,b)=>a+(b-mean)**2,0)/encryptedData.length;
let std=Math.sqrt(variance);

document.getElementById("stats").innerHTML=
`Mean: ${mean.toFixed(2)}<br>
Variance: ${variance.toFixed(2)}<br>
Std Dev: ${std.toFixed(2)}`;

}

/* PARTICLES */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(p);
}

</script>

</body>
</html>
